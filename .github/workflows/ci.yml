# fileupload CI/CD — 自动构建、测试、发布
#
# 触发条件:
#   - push 到 main 分支
#   - 创建 tag (v*) 时自动发布 Release
#
# 构建产物:
#   - fileupload-server-{os}-{arch}  (Linux arm64/amd64, macOS amd64/arm64)
#   - fileupload-cli-{os}-{arch}     (Linux arm64/amd64, macOS amd64/arm64)
#   - Docker 镜像 (linux/amd64, linux/arm64)

name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.23"
  APP_NAME: "fileupload"

jobs:
  # ========================================
  # 测试
  # ========================================
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests with race detection
        run: go test -race -count=1 -timeout 120s ./...
        env:
          FILEUPLOAD_REDIS_ADDR: localhost:6379

      - name: Run vet
        run: go vet ./...

  # ========================================
  # 全平台交叉编译
  # ========================================
  build:
    name: Build
    needs: [test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
        component: [server, fileupload]
        include:
          - component: server
            bin_name: server
          - component: fileupload
            bin_name: cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build ${{ matrix.component }} (${{ matrix.goos }}/${{ matrix.goarch }})
        run: |
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w" \
            -o build/${{ env.APP_NAME }}-${{ matrix.bin_name }}-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/${{ matrix.component }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.bin_name }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/${{ env.APP_NAME }}-${{ matrix.bin_name }}-${{ matrix.goos }}-${{ matrix.goarch }}

  # ========================================
  # Docker 镜像构建
  # ========================================
  docker:
    name: Docker
    needs: [test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-and-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========================================
  # Release: 上传构建产物到 Release
  # ========================================
  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: ${{ env.APP_NAME }}-*
          merge-multiple: true
          path: build/

      - name: Generate checksums
        working-directory: build
        run: sha256sum * > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: build/*
          generate_release_notes: true
