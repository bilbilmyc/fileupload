# fileupload CI/CD — 自动构建、测试、发布
#
# 触发条件:
#   - push 到 main 分支
#   - 创建 tag (v*) 时自动发布 Release
#
# 构建产物:
#   - fileupload-server-{os}-{arch}  (Linux arm64/amd64, macOS amd64/arm64)
#   - fileupload-cli-{os}-{arch}     (Linux arm64/amd64, macOS amd64/arm64)
#   - Docker 镜像构建验证（v0.11.1+: 不推 ghcr.io，避免 GitHub Packages 栏堆积）

name: CI/CD

permissions:
  contents: read

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.25"
  APP_NAME: "fileupload"

jobs:
  # ========================================
  # 测试
  # ========================================
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests with race detection
        run: go test -race -count=1 -timeout 120s ./...
        env:
          FILEUPLOAD_REDIS_ADDR: localhost:6379

      - name: Run vet
        run: go vet ./...

  # ========================================
  # 全平台交叉编译
  # ========================================
  build:
    name: Build
    needs: [test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
        component: [server, fileupload]
        include:
          - component: server
            bin_name: server
          - component: fileupload
            bin_name: cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build ${{ matrix.component }} (${{ matrix.goos }}/${{ matrix.goarch }})
        run: |
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w" \
            -o build/${{ env.APP_NAME }}-${{ matrix.bin_name }}-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/${{ matrix.component }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.bin_name }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/${{ env.APP_NAME }}-${{ matrix.bin_name }}-${{ matrix.goos }}-${{ matrix.goarch }}

  # ========================================
  # Docker 镜像构建（使用 build job 预编译产物，无需 QEMU 模拟编译）
  # ========================================
  docker:
    name: Docker (${{ matrix.component }} / ${{ matrix.platform }})
    needs: [build]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
        component: [server, fileupload]
        include:
          - component: server
            bin_name: server
            image_name: fileupload-server
          - component: fileupload
            bin_name: cli
            image_name: fileupload-cli
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Go arch from platform
        id: arch
        run: |
          ARCH=$(echo "${{ matrix.platform }}" | cut -d/ -f2)
          echo "goarch=$ARCH" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.bin_name }}-linux-${{ steps.arch.outputs.goarch }}
          path: build/

      - name: Rename binary for Dockerfile
        run: cp build/${{ env.APP_NAME }}-${{ matrix.bin_name }}-linux-${{ steps.arch.outputs.goarch }} ./${{ env.APP_NAME }}-${{ matrix.bin_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build Docker image (v0.11.1+: 不推 ghcr.io)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.dist
          build-args: BINARY=${{ matrix.bin_name }}
          platforms: ${{ matrix.platform }}
          push: false  # v0.11.1 收尾版：不在 GitHub Packages 推送
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 不用 cache-from（避免从 ghcr.io 拉取已停推的旧镜像）

  # ========================================
  # Dev Release: main 分支每次推送都更新持续 Release
  # ========================================
  dev-release:
    name: Dev Release
    if: github.ref == 'refs/heads/main'
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: ${{ env.APP_NAME }}-*
          merge-multiple: true
          path: build/

      - name: Generate checksums
        working-directory: build
        run: sha256sum * > checksums.txt

      - name: Upload dev release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: "Dev Build (${{ github.sha }})"
          body: |
            自动构建 — 提交 ${{ github.sha }}
            分支: main
            时间: ${{ github.event.head_commit.timestamp || 'N/A' }}
          files: build/*
          target_commitish: ${{ github.sha }}

  # ========================================
  # Release: tag 推送时创建正式版本 Release + 版本镜像
  #
  # 触发: `git push origin vX.Y.Z`
  # 产物:
  #   - GitHub Release（自动生成 release notes）
  #   - 8 个二进制（linux/darwin × amd64/arm64 × server/cli）+ checksums.txt
  #   - Docker 镜像（由 docker job 推送，含 semver tag）
  # ========================================
  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: ${{ env.APP_NAME }}-*
          merge-multiple: true
          path: build/

      - name: Generate checksums
        working-directory: build
        run: sha256sum * > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: build/*
          generate_release_notes: true
