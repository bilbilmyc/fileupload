# fileupload 服务端 Docker Compose 部署
# 包含 Redis + fileupload-server
#
# 启动:
#   cd deploy/docker
#   docker compose up -d
#
# 停止:
#   docker compose down
#
# 查看日志:
#   docker compose logs -f

services:
  redis:
    image: redis:7-alpine
    container_name: fileupload-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  server:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: fileupload-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - FILEUPLOAD_REDIS_ADDR=redis:6379
      - FILEUPLOAD_DB_PATH=/var/lib/fileupload/fileupload.db
      # PostgreSQL 模式时改用以下配置（注释掉上面的 SQLite 配置）
      # - FILEUPLOAD_DATABASE_TYPE=postgres
      # - FILEUPLOAD_PG_HOST=postgres
      # - FILEUPLOAD_PG_PORT=5432
      # - FILEUPLOAD_PG_USER=postgres
      # - FILEUPLOAD_PG_PASSWORD=Postgres@2026
      # - FILEUPLOAD_PG_DBNAME=fileupload
      # - FILEUPLOAD_PG_SSLMODE=disable
      - FILEUPLOAD_CONFIG=/etc/fileupload/fileupload.yaml
      - TZ=Asia/Shanghai
    volumes:
      - fileupload-data:/var/lib/fileupload
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
  fileupload-data:
