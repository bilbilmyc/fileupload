# Alertmanager 路由配置 — fileupload
#
# 文件被 prometheus.yml 通过 alerting 配置引用：
#   alerting:
#     alertmanagers:
#       - static_configs:
#           - targets: ['localhost:9093']
#     alert_relabel_configs: [...]
#
# 路由按 severity label 分流：critical → 立即告警（PagerDuty / 钉钉），
# warning → 5 分钟聚合后通知（Slack / 邮件）。
#
# 改 receiver 时记得同步 deploy/prometheus/alertmanager_test.go。

global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.example.com:587'
  smtp_from: 'alertmanager@example.com'
  smtp_require_tls: true

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  receiver: 'default'
  group_by: ['alertname', 'component']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    # critical 立即通知
    - matchers:
        - name: severity
          value: critical
          matchType: '='
      receiver: 'pagerduty-critical'
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 1h
      continue: false

    # warning 聚合后通知
    - matchers:
        - name: severity
          value: warning
          matchType: '='
      receiver: 'slack-warning'
      group_wait: 1m
      group_interval: 10m
      repeat_interval: 4h
      continue: false

    # info 仅记录到邮件归档
    - matchers:
        - name: severity
          value: info
          matchType: '='
      receiver: 'email-archive'
      group_wait: 5m
      group_interval: 1h
      repeat_interval: 24h
      continue: false

# 抑制规则：上游宕机时，依赖它的告警不发
inhibit_rules:
  # FileUploadDown 时，抑制所有相关组件告警
  - source_matchers:
      - name: alertname
        value: FileUploadDown
        matchType: '='
    target_matchers:
      - name: alertname
        value: FileUploadHealthDegraded
        matchType: '='
    equal: ['instance']

  # FileUploadDown 时，抑制 Stalled（服务不可达 ≠ 上传停摆）
  - source_matchers:
      - name: alertname
        value: FileUploadDown
        matchType: '='
    target_matchers:
      - name: alertname
        value: FileUploadStalled
        matchType: '='
    equal: ['instance']

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://localhost:5001/alerts'
        send_resolved: true

  # critical：7×24 值班
  - name: 'pagerduty-critical'
    pagerduty_configs:
      - service_key: '<PAGERDUTY_SERVICE_KEY>'
        severity: 'critical'
        send_resolved: true
    webhook_configs:
      - url: 'https://oapi.dingtalk.com/robot/send?access_token=<DINGTALK_TOKEN>'
        send_resolved: true
        max_alerts: 0  # 0 = 不限制

  # warning：工作时段处理
  - name: 'slack-warning'
    slack_configs:
      - api_url: '<SLACK_WEBHOOK_URL>'
        channel: '#fileupload-alerts'
        send_resolved: true
        title: 'fileupload warning: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}'

  # info：仅邮件归档
  - name: 'email-archive'
    email_configs:
      - to: 'fileupload-team@example.com'
        send_resolved: true
        headers:
          Subject: 'fileupload info: {{ .GroupLabels.alertname }}'