<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fileupload 管理面板</title>
<style>
  :root {
    --bg: #f5f7fa; --card: #fff; --border: #e2e8f0;
    --primary: #3b82f6; --primary-hover: #2563eb;
    --success: #22c55e; --danger: #ef4444;
    --text: #1e293b; --text2: #64748b; --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.6; padding: 24px; }
  .container { max-width: 960px; margin: 0 auto; }
  h1 { font-size: 1.6rem; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
  .subtitle { color: var(--text2); margin-bottom: 24px; font-size: 0.9rem; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
  .card h2 { font-size: 1.1rem; margin-bottom: 12px; }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .card-header h2 { margin-bottom: 0; }

  .upload-zone { border: 2px dashed var(--border); border-radius: var(--radius);
    padding: 36px 20px; text-align: center; cursor: pointer; transition: all 0.2s; }
  .upload-zone:hover, .upload-zone.dragover { border-color: var(--primary); background: #f0f7ff; }
  .upload-zone .icon { font-size: 2.5rem; margin-bottom: 8px; }
  .upload-zone p { color: var(--text2); }
  .upload-zone input { display: none; }

  .progress-bar { width: 100%; height: 10px; background: var(--border);
    border-radius: 5px; overflow: hidden; margin: 4px 0; }
  .progress-bar .fill { height: 100%; background: linear-gradient(90deg, var(--primary), #818cf8);
    width: 0%; transition: width 0.3s ease; border-radius: 5px; }

  .status { font-size: 0.85rem; color: var(--text2); }
  .status.success { color: var(--success); }
  .status.error { color: var(--danger); }

  .upload-item { padding: 10px 12px; border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 8px; background: #fafbfc; }
  .upload-item .name { font-weight: 500; font-size: 0.9rem; word-break: break-all; }
  .upload-item .meta { font-size: 0.8rem; color: var(--text2); margin: 2px 0; }

  .tree-node { padding: 6px 0; border-bottom: 1px solid var(--border); }
  .tree-node:last-child { border-bottom: none; }
  .tree-row { display: flex; align-items: center; gap: 8px; }
  .tree-row .icon { font-size: 1rem; flex-shrink: 0; }
  .tree-row .name { flex: 1; font-size: 0.9rem; cursor: pointer;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tree-row .name:hover { color: var(--primary); }
  .tree-row .meta { font-size: 0.78rem; color: var(--text2); white-space: nowrap; }
  .tree-row .actions { display: flex; gap: 4px; flex-shrink: 0; }
  .tree-children { padding-left: 28px; }

  .btn { display: inline-flex; align-items: center; gap: 4px;
    padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--card); cursor: pointer; font-size: 0.82rem;
    transition: all 0.15s; white-space: nowrap; }
  .btn:hover { background: var(--bg); }
  .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
  .btn-primary:hover { background: var(--primary-hover); }
  .btn-danger { color: var(--danger); border-color: var(--danger); }
  .btn-danger:hover { background: #fef2f2; }
  .btn-sm { padding: 3px 8px; font-size: 0.78rem; }

  .toast { position: fixed; bottom: 24px; right: 24px;
    padding: 12px 20px; border-radius: var(--radius); color: #fff; font-size: 0.9rem;
    transform: translateY(80px); opacity: 0; transition: all 0.3s;
    z-index: 100; max-width: 400px; word-break: break-all; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: var(--success); }
  .toast.error { background: var(--danger); }

  .config-row { display: flex; gap: 16px; flex-wrap: wrap; margin: 12px 0; }
  .config-row label { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; color: var(--text2); }
  .config-row input, .config-row select { padding: 4px 8px; border: 1px solid var(--border);
    border-radius: 4px; font-size: 0.85rem; width: 120px; }
  .checkbox-label { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; cursor: pointer; }
  .empty-state { text-align: center; padding: 24px; color: var(--text2); font-size: 0.9rem; }
  .search-box { padding: 6px 12px; border: 1px solid var(--border);
    border-radius: 6px; font-size: 0.85rem; width: 160px; }
</style>
</head>
<body>
<div class="container">
  <h1>📦 fileupload</h1>
  <p class="subtitle">管理面板</p>
  <div id="toast" class="toast"></div>

  <div class="card">
    <h2>📤 上传</h2>
    <div class="config-row">
      <label>Namespace <input type="text" id="namespace" value="demo" style="width:100px"></label>
      <label>分片 <input type="number" id="chunkSize" value="10485760" min="1024"></label>
      <label>压缩 <select id="compressType"><option value="none">无</option><option value="zstd">zstd</option></select></label>
      <label>并发 <select id="concurrencySelect"><option value="0">auto</option><option value="1">1</option><option value="2">2</option><option value="4" selected>4</option><option value="8">8</option><option value="16">16</option></select></label>
      <label class="checkbox-label"><input type="checkbox" id="dirMode"> 📁 目录模式</label>
    </div>
    <div class="upload-zone" id="dropZone">
      <div class="icon">☁️</div>
      <p id="dropText">点击选择文件/目录，或拖拽到此处</p>
      <input type="file" id="fileInput" multiple>
    </div>
    <div id="uploadQueue"></div>
  </div>

  <div class="card">
    <div class="card-header">
      <h2>📋 文件</h2>
      <div style="display:flex; gap:8px; align-items:center;">
        <input type="text" id="fileFilter" class="search-box" placeholder="筛选…" oninput="renderFileTree()">
        <button class="btn btn-sm" onclick="loadFileTree()">🔄</button>
        <button class="btn btn-sm btn-danger" onclick="deleteAll()">🗑 清空</button>
      </div>
    </div>
    <div id="fileTree"><div class="empty-state">加载中…</div></div>
  </div>
</div>

<script>
// ====== toast ======
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast ' + type + ' show';
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ====== file input ======
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

function toggleDirMode() {
  const dirMode = document.getElementById('dirMode').checked;
  if (dirMode) {
    fileInput.setAttribute('webkitdirectory', '');
    fileInput.removeAttribute('multiple');
    document.getElementById('dropText').textContent = '📁 点击选择目录';
  } else {
    fileInput.removeAttribute('webkitdirectory');
    fileInput.setAttribute('multiple', '');
    document.getElementById('dropText').textContent = '点击选择文件，或拖拽到此处';
  }
}
document.getElementById('dirMode').addEventListener('change', toggleDirMode);

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('dragover');
  const files = Array.from(e.dataTransfer.files);
  if (files.length) handleFiles(files);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files.length) handleFiles(Array.from(fileInput.files));
  fileInput.value = '';
});

function handleFiles(files) {
  const dirMode = document.getElementById('dirMode').checked;
  if (dirMode && files[0]?.webkitRelativePath) { startDirUpload(files); }
  else { files.forEach(f => startSingleUpload(f)); }
}

// ====== upload system ======
let uploadIdCounter = 0;

function addUploadItem(id, label, size) {
  document.getElementById('uploadQueue').insertAdjacentHTML('beforeend',
    `<div class="upload-item" id="up-${id}">
      <div class="name">${esc(label)}</div>
      <div class="meta">${size}</div>
      <div class="bar"><div class="progress-bar"><div class="fill" id="uf-${id}"></div></div></div>
      <div class="status" id="us-${id}">排队中…</div>
    </div>`);
}
function up(id, pct, txt, ok) {
  document.getElementById(`uf-${id}`).style.width = Math.min(pct, 100) + '%';
  const el = document.getElementById(`us-${id}`);
  el.textContent = txt;
  el.className = 'status' + (ok === true ? ' success' : ok === false ? ' error' : '');
}

async function startSingleUpload(file) {
  const id = ++uploadIdCounter;
  addUploadItem(id, file.name, fmtSize(file.size));
  try { await uploadFile(file, id, file.name); }
  catch (e) { up(id, 0, '❌ ' + e.message, false); toast(e.message, 'error'); }
}

async function startDirUpload(files) {
  const id = ++uploadIdCounter;
  const dirName = files[0].webkitRelativePath.split('/')[0];
  addUploadItem(id, '📁 ' + dirName, files.length + ' 个文件（并发 ' + concurrency + '）');
  up(id, 1, '准备上传 ' + files.length + ' 个文件…');

  const ns = document.getElementById('namespace').value || 'demo';
  let concurrency = parseInt(document.getElementById('concurrencySelect').value) || 0;
  if (concurrency <= 0) concurrency = navigator.hardwareConcurrency || 4; // auto
  const entries = [];
  let completed = 0;
  let errors = 0;

  // 用 concurrency 个 worker 并发上传
  async function worker(queue) {
    for (let idx of queue) {
      const f = files[idx];
      const relPath = f.webkitRelativePath.substring(dirName.length + 1);
      try {
        const fileID = await uploadFile(f, null, relPath);
        if (fileID) entries.push({ path: relPath, file_id: fileID });
        completed++;
      } catch (e) {
        errors++;
        console.error('上传失败:', relPath, e);
      }
      const pct = 2 + (completed / files.length) * 90;
      up(id, pct, `[${completed}/${files.length}] ${errors ? errors + ' 错误' : ''}`);
    }
  }

  // 启动 concurrency 个并发 worker
  const chunkSize = Math.ceil(files.length / concurrency);
  const workers = [];
  for (let i = 0; i < concurrency; i++) {
    const start = i * chunkSize;
    const end = Math.min(start + chunkSize, files.length);
    if (start >= files.length) break;
    workers.push(worker([...Array(end - start).keys()].map(k => start + k)));
  }
  await Promise.all(workers);

  if (entries.length === 0) {
    up(id, 0, '❌ 没有文件上传成功', false);
    toast('目录上传失败: 所有文件都失败了', 'error');
    return;
  }

  // 提交 manifest（带上目录名）
  up(id, 95, '提交 manifest…');
  try {
    const resp = await fetch('/v1/dirs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Namespace': ns },
      body: JSON.stringify({ name: dirName, entries })
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    up(id, 100, `✅ 目录上传完成! DirID: ${data.dir_id}`, true);
    toast(`📁 "${dirName}" 上传完成 (${entries.length} 个文件)`, 'success');
    setTimeout(loadFileTree, 500);
  } catch (e) {
    up(id, 0, '❌ ' + e.message, false);
    toast(e.message, 'error');
  }
}

async function uploadFile(file, uploadId, customName) {
  const ns = document.getElementById('namespace').value || 'demo';
  const compress = document.getElementById('compressType').value;

  if (uploadId) up(uploadId, 0, '计算 SHA-256…');
  const sha256 = await computeSHA256(file);

  // 秒传
  if (uploadId) up(uploadId, 1, '秒传预检…');
  const checkResp = await fetch(`/v1/files?sha256=${sha256}&name=${encodeURIComponent(customName)}`, {
    method: 'HEAD', headers: { 'X-Namespace': ns }
  });
  if (checkResp.status === 200) {
    try { const d = await checkResp.json(); if (uploadId) up(uploadId, 100, '✅ 秒传命中', true); return d.file_id; } catch(e) {}
  }

  // 创建会话
  if (uploadId) up(uploadId, 2, '创建会话…');
  const initResp = await fetch(`/v1/uploads/init?size=${file.size}`, {
    method: 'POST',
    headers: { 'X-SHA256': sha256, 'X-Compression': compress, 'X-Namespace': ns, 'X-File-Name': customName }
  });
  if (!initResp.ok) throw new Error('创建会话失败');
  const initData = await initResp.json();
  const sessionID = initData.session_id;
  const chunkSize = initData.chunk_size || parseInt(document.getElementById('chunkSize').value) || 10485760;
  const totalChunks = Math.ceil(file.size / chunkSize);

  // 分片上传
  let uploadedBytes = 0;
  const startTime = Date.now();
  for (let i = 0; i < totalChunks; i++) {
    const buf = await file.slice(i * chunkSize, Math.min((i + 1) * chunkSize, file.size)).arrayBuffer();
    const sliceSHA = await sha256Hex(buf);

    const r = await fetch(`/v1/uploads/${sessionID}/chunks/${i}`, {
      method: 'PUT', body: buf,
      headers: { 'X-Slice-SHA256': sliceSHA, 'Content-Type': 'application/octet-stream', 'X-Namespace': ns }
    });
    if (!r.ok) throw new Error(`分片 ${i+1}/${totalChunks} 失败`);

    uploadedBytes += buf.byteLength;
    if (uploadId) {
      const pct = 2 + (uploadedBytes / file.size) * 93;
      const elapsed = (Date.now() - startTime) / 1000;
      const speed = elapsed > 0 ? fmtSize(uploadedBytes / elapsed) + '/s' : '';
      up(uploadId, pct, `${i+1}/${totalChunks} · ${fmtSize(uploadedBytes)}/${fmtSize(file.size)}${speed ? ' · ' + speed : ''}`);
    }
  }

  // Finalize
  if (uploadId) up(uploadId, 96, '合并中…');
  const finalResp = await fetch(`/v1/uploads/${sessionID}/finalize`, { method: 'POST', headers: { 'X-Namespace': ns } });
  if (!finalResp.ok) throw new Error('Finalize 失败');
  const finalData = await finalResp.json();

  if (uploadId) up(uploadId, 100, `✅ ${finalData.file_id.slice(0,12)}…`, true);
  return finalData.file_id;
}

// ====== SHA-256 ======
async function computeSHA256(file) {
  const h = await crypto.subtle.digest('SHA-256', await file.arrayBuffer());
  return hex(new Uint8Array(h));
}
async function sha256Hex(buf) {
  return hex(new Uint8Array(await crypto.subtle.digest('SHA-256', buf)));
}
function hex(u8) { return Array.from(u8).map(b => b.toString(16).padStart(2,'0')).join(''); }

// ====== file tree (递归加载) ======
let flatFiles = [];

async function loadFileTree() {
  const ns = document.getElementById('namespace').value || 'demo';
  document.getElementById('fileTree').innerHTML = '<div class="empty-state">加载中…</div>';
  flatFiles = await loadAllChildren(ns, '');
  renderFileTree();
}

async function loadAllChildren(ns, parentId) {
  const url = parentId ? `/v1/ls?parent=${parentId}&namespace=${ns}` : `/v1/ls?namespace=${ns}`;
  const resp = await fetch(url);
  if (!resp.ok) return [];
  const data = await resp.json();
  // "dir" 是目录本身（parentId 查询时返回），"children" 是子节点
  let list = data.children || [];
  if (data.dir) {
    list = [data.dir, ...list];
  }
  // 去重
  const seen = new Set();
  const result = [];
  for (const f of list) {
    if (seen.has(f.file_id)) continue;
    seen.add(f.file_id);
    result.push({
      id: f.file_id, name: f.name, path: f.path || f.name,
      size: f.size || 0, isDir: f.is_dir || false, parentId: parentId,
    });
  }
  return result;
}

async function renderFileTree() {
  const el = document.getElementById('fileTree');
  const filter = (document.getElementById('fileFilter').value || '').toLowerCase();

  if (flatFiles.length === 0) { el.innerHTML = '<div class="empty-state">尚无文件</div>'; return; }

  // 过滤
  let list = flatFiles;
  if (filter) list = flatFiles.filter(f => f.name.toLowerCase().includes(filter) || f.path.toLowerCase().includes(filter));

  // 按 parentId 分组建立树
  const childrenOf = {};
  for (const f of list) {
    const p = f.parentId || '';
    if (!childrenOf[p]) childrenOf[p] = [];
    childrenOf[p].push(f);
  }

  // 递归渲染
  function render(parentId, depth) {
    const kids = childrenOf[parentId] || [];
    return kids.map(f => {
      const indent = depth * 20;
      const hasKids = childrenOf[f.id] && childrenOf[f.id].length > 0;
      return `<div class="tree-node" style="padding-left:${indent}px">
        <div class="tree-row">
          <span class="icon">${f.isDir ? '📁' : '📄'}</span>
          <span class="name" ${!f.isDir ? `onclick="downloadFile('${f.id}','${esc(f.name)}','raw')"` : ''} title="${esc(f.path)}">${esc(f.name)}</span>
          <span class="meta">${!f.isDir ? fmtSize(f.size) : hasKids ? childrenOf[f.id].length + '项' : ''}</span>
          <span class="actions">
            ${f.isDir ? `<button class="btn btn-sm" onclick="downloadFile('${f.id}','${esc(f.name)}','tar.gz')">⬇ tar.gz</button>` : `<button class="btn btn-sm" onclick="downloadFile('${f.id}','${esc(f.name)}','raw')">⬇</button>`}
            <button class="btn btn-sm btn-danger" onclick="deleteFile('${f.id}')">🗑</button>
          </span>
        </div>
        ${hasKids ? '<div class="tree-children">' + render(f.id, depth + 1) + '</div>' : ''}
      </div>`;
    }).join('');
  }

  el.innerHTML = render('', 0) || '<div class="empty-state">无匹配文件</div>';
}

// ====== file ops ======
async function deleteFile(id) {
  const ns = document.getElementById('namespace').value || 'demo';
  if (!confirm('确定删除？')) return;
  try {
    const r = await fetch(`/v1/files/${id}`, { method: 'DELETE', headers: { 'X-Namespace': ns } });
    if (!r.ok) throw new Error('删除失败');
    toast('已删除', 'success');
    setTimeout(loadFileTree, 300);
  } catch (e) { toast(e.message, 'error'); }
}

async function deleteAll() {
  if (!confirm('确定删除所有文件？')) return;
  const ns = document.getElementById('namespace').value || 'demo';
  try {
    const r = await fetch(`/v1/ls?namespace=${ns}`);
    const d = await r.json();
    for (const f of (d.children || [])) {
      await fetch(`/v1/files/${f.file_id}`, { method: 'DELETE', headers: { 'X-Namespace': ns } });
    }
    toast('已清空', 'success');
    loadFileTree();
  } catch (e) { toast(e.message, 'error'); }
}

// ====== download ======
async function downloadFile(id, name, format) {
  const ns = document.getElementById('namespace').value || 'demo';
  const url = format === 'raw' ? `/v1/files/${id}?namespace=${ns}` : `/v1/dirs/${id}?format=${format}&namespace=${ns}`;
  const dlId = ++uploadIdCounter;
  addUploadItem(dlId, '⬇ ' + name, '');
  up(dlId, 0, '下载中…');

  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const total = parseInt(resp.headers.get('Content-Length') || '0');
    const reader = resp.body.getReader();
    const chunks = [];
    let received = 0;
    let lastUpdate = Date.now();
    let lastBytes = 0;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
      received += value.length;
      const now = Date.now();
      if (now - lastUpdate > 200 || received >= total) {
        const speed = fmtSize((received - lastBytes) / ((now - lastUpdate) / 1000));
        lastUpdate = now; lastBytes = received;
        up(dlId, total > 0 ? received/total*100 : 0,
          `${fmtSize(received)}${total > 0 ? '/'+fmtSize(total) : ''} · ${speed}/s`);
      }
    }

    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob(chunks));
    a.download = name + (format === 'raw' ? '' : '.' + format);
    a.click();
    URL.revokeObjectURL(a.href);
    up(dlId, 100, '✅ ' + fmtSize(received), true);
    toast('⬇ ' + name + ' 完成', 'success');
  } catch (e) {
    up(dlId, 0, '❌ ' + e.message, false);
    toast(e.message, 'error');
  }
}

// ====== utility ======
function fmtSize(bytes) {
  if (!bytes || bytes === 0) return '0 B';
  const u = ['B','KB','MB','GB','TB'];
  const i = Math.floor(Math.log(bytes) / Math.log(1024));
  return (bytes / Math.pow(1024, i)).toFixed(i>0 ? 1 : 0) + ' ' + u[i];
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// start
loadFileTree();
</script>
</body>
</html>
