<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fileupload 管理面板</title>
<style>
  :root {
    --bg: #f5f7fa;
    --card: #fff;
    --border: #e2e8f0;
    --primary: #3b82f6;
    --primary-hover: #2563eb;
    --success: #22c55e;
    --danger: #ef4444;
    --text: #1e293b;
    --text2: #64748b;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 24px;
  }
  .container { max-width: 960px; margin: 0 auto; }
  h1 { font-size: 1.6rem; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
  .subtitle { color: var(--text2); margin-bottom: 24px; font-size: 0.9rem; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }
  .card h2 { font-size: 1.1rem; margin-bottom: 12px; }

  /* === Upload zone === */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--primary);
    background: #f0f7ff;
  }
  .upload-zone .icon { font-size: 2.5rem; margin-bottom: 8px; }
  .upload-zone p { color: var(--text2); }
  .upload-zone input { display: none; }

  .progress-bar {
    width: 100%;
    height: 10px;
    background: var(--border);
    border-radius: 5px;
    overflow: hidden;
    margin: 8px 0;
  }
  .progress-bar .fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), #818cf8);
    width: 0%;
    transition: width 0.3s ease;
    border-radius: 5px;
  }
  .status { font-size: 0.85rem; color: var(--text2); }
  .status.success { color: var(--success); }
  .status.error { color: var(--danger); }

  /* === Upload queue === */
  .upload-item {
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
    background: #fafbfc;
  }
  .upload-item .name { font-weight: 500; font-size: 0.9rem; }
  .upload-item .meta { font-size: 0.8rem; color: var(--text2); margin: 2px 0; }
  .upload-item .bar { margin: 4px 0; }
  .upload-item .status { font-size: 0.8rem; }

  /* === File list === */
  .file-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .file-item:last-child { border-bottom: none; }
  .file-info { flex: 1; min-width: 0; }
  .file-name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-meta { font-size: 0.8rem; color: var(--text2); }
  .file-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .file-actions .tag {
    font-size: 0.75rem;
    padding: 2px 8px;
    border-radius: 4px;
    background: #e5e7eb;
  }
  .tag.success { background: #dcfce7; color: #166534; }
  .tag.error { background: #fee2e2; color: #991b1b; }
  .tag.pending { background: #fef9c3; color: #854d0e; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--card);
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.15s;
  }
  .btn:hover { background: var(--bg); }
  .btn-primary {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }
  .btn-primary:hover { background: var(--primary-hover); }
  .btn-danger { color: var(--danger); border-color: var(--danger); }
  .btn-danger:hover { background: #fef2f2; }
  .btn-sm { padding: 4px 10px; font-size: 0.8rem; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 12px 20px;
    border-radius: var(--radius);
    color: #fff;
    font-size: 0.9rem;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s;
    z-index: 100;
    max-width: 400px;
    word-break: break-all;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: var(--success); }
  .toast.error { background: var(--danger); }

  .tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 2px solid var(--border); }
  .tab {
    padding: 8px 20px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    color: var(--text2);
    font-size: 0.9rem;
    user-select: none;
  }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .empty-state { text-align: center; padding: 32px; color: var(--text2); }

  .config-row {
    display: flex; gap: 16px; flex-wrap: wrap; margin: 12px 0;
  }
  .config-row label {
    display: flex; align-items: center; gap: 6px; font-size: 0.85rem; color: var(--text2);
  }
  .config-row input, .config-row select {
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 0.85rem;
    width: 120px;
  }

  .badge { display: inline-block; font-size: 0.7rem; padding: 1px 6px; border-radius: 3px; margin-left: 4px; }
  .badge-blue { background: #dbeafe; color: #1e40af; }

  @media (max-width: 640px) {
    .file-item { flex-direction: column; align-items: flex-start; gap: 8px; }
    .file-actions { align-self: flex-end; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>📦 fileupload</h1>
  <p class="subtitle">文件上传下载服务 · 管理面板</p>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" data-tab="upload">上传</div>
    <div class="tab" data-tab="files">文件列表</div>
    <div class="tab" data-tab="download">下载</div>
  </div>

  <!-- ====== 上传 Tab ====== -->
  <div id="tab-upload" class="tab-content active">
    <div class="card">
      <h2>📤 上传文件</h2>
      <div class="config-row">
        <label>分片大小 <input type="number" id="chunkSize" value="10485760" min="1024"></label>
        <label>压缩 <select id="compressType"><option value="none">无</option><option value="zstd">zstd</option></select></label>
        <label>Namespace <input type="text" id="namespace" value="demo" style="width:100px"></label>
      </div>
      <div style="display:flex; gap:12px; align-items:center; margin-bottom:8px;">
        <label style="font-size:0.85rem; cursor:pointer;">
          <input type="checkbox" id="dirMode"> 📁 目录模式
        </label>
        <span id="dirModeHint" style="font-size:0.8rem; color:var(--text2); display:none;">选择目录后递归上传</span>
      </div>
      <div class="upload-zone" id="dropZone">
        <div class="icon">☁️</div>
        <p>点击选择文件，或拖拽到此处（支持多文件）</p>
        <input type="file" id="fileInput" multiple>
      </div>
    </div>

    <!-- Upload Queue -->
    <div id="uploadQueue"></div>
  </div>

  <!-- ====== 文件列表 Tab ====== -->
  <div id="tab-files" class="tab-content">
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
        <h2>📋 文件列表</h2>
        <div style="display:flex; gap:8px;">
          <button class="btn btn-sm" onclick="listFiles()">🔄 刷新</button>
          <button class="btn btn-sm btn-danger" onclick="deleteAll()" id="deleteAllBtn" disabled>🗑 全删</button>
        </div>
      </div>
      <div id="fileList">
        <div class="empty-state">尚无文件</div>
      </div>
    </div>
  </div>

  <!-- ====== 下载 Tab ====== -->
  <div id="tab-download" class="tab-content">
    <div class="card">
      <h2>⬇️ 下载文件</h2>
      <div style="display:flex; gap:8px; margin-top:8px;">
        <input type="text" id="downloadID" placeholder="输入 FileID 或 DirID"
               style="flex:1; padding:8px 12px; border:1px solid var(--border); border-radius:6px; font-size:0.9rem;">
        <button class="btn btn-primary" onclick="downloadFile()">下载</button>
      </div>
      <div style="margin-top:8px; display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
        <label style="font-size:0.85rem; color:var(--text2)">
          <input type="checkbox" id="downloadVerify"> 校验 SHA-256
        </label>
        <select id="downloadFormat" style="padding:4px 8px; border:1px solid var(--border); border-radius:4px; font-size:0.85rem;">
          <option value="raw">原始文件</option>
          <option value="tar.gz">tar.gz</option>
          <option value="tar.zst">tar.zst</option>
        </select>
        <span id="downloadInfo" style="font-size:0.8rem; color:var(--text2);"></span>
      </div>
    </div>

    <!-- Download Queue -->
    <div id="downloadQueue"></div>
  </div>
</div>

<script>
// ===== Tab 切换 =====
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'files') listFiles();
  });
});

// ===== Toast =====
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type + ' show';
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ===== 目录模式 =====
function toggleDirMode() {
  const dirMode = document.getElementById('dirMode').checked;
  const input = document.getElementById('fileInput');
  const hint = document.getElementById('dirModeHint');
  hint.style.display = dirMode ? 'inline' : 'none';
  if (dirMode) {
    input.setAttribute('webkitdirectory', '');
    input.multiple = false;
  } else {
    input.removeAttribute('webkitdirectory');
    input.multiple = true;
  }
}
document.getElementById('dirMode').addEventListener('change', toggleDirMode);

// ===== 拖拽上传 =====
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  const files = Array.from(e.dataTransfer.files);
  if (files.length) handleFiles(files);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files.length) handleFiles(Array.from(fileInput.files));
  fileInput.value = '';
});

function handleFiles(files) {
  const dirMode = document.getElementById('dirMode').checked;
  if (dirMode && files[0]?.webkitRelativePath) {
    startDirUpload(files);
  } else {
    files.forEach(f => startSingleUpload(f));
  }
}

// ==============================
//  上传系统
// ==============================

let uploadIdCounter = 0;

function uploadItemHTML(id, fileName, fileSize) {
  return `
    <div class="upload-item" id="upload-${id}">
      <div class="name">📄 ${escapeHtml(fileName)}</div>
      <div class="meta">${formatSize(fileSize)}</div>
      <div class="bar">
        <div class="progress-bar"><div class="fill" id="ufill-${id}"></div></div>
      </div>
      <div class="status" id="ustatus-${id}">排队中…</div>
    </div>`;
}

function updateUploadProgress(id, pct, statusText, isSuccess) {
  document.getElementById(`ufill-${id}`).style.width = Math.min(pct, 100) + '%';
  const el = document.getElementById(`ustatus-${id}`);
  el.textContent = statusText;
  el.className = 'status' + (isSuccess === true ? ' success' : isSuccess === false ? ' error' : '');
}

async function startSingleUpload(file) {
  const id = ++uploadIdCounter;
  const queue = document.getElementById('uploadQueue');
  queue.insertAdjacentHTML('beforeend', uploadItemHTML(id, file.name, file.size));
  updateUploadProgress(id, 0, '准备中…');
  await uploadFile(file, (pct, status) => updateUploadProgress(id, pct, status));
}

async function startDirUpload(files) {
  const id = ++uploadIdCounter;
  const dirName = files[0].webkitRelativePath.split('/')[0];
  const queue = document.getElementById('uploadQueue');
  queue.insertAdjacentHTML('beforeend', uploadItemHTML(id, '📁 ' + dirName, 0));
  updateUploadProgress(id, 0, `上传目录: ${files.length} 个文件…`);

  const ns = document.getElementById('namespace').value || 'demo';
  const compress = document.getElementById('compressType').value;
  const entries = [];

  for (let i = 0; i < files.length; i++) {
    const f = files[i];
    const relPath = f.webkitRelativePath.substring(dirName.length + 1);
    const pct = (i / files.length) * 100;
    updateUploadProgress(id, pct, `[${i+1}/${files.length}] ${relPath}`);

    try {
      const fileID = await uploadFile(f, () => {});
      if (fileID) entries.push({ path: relPath, file_id: fileID });
    } catch (e) {
      console.error(`目录上传失败: ${relPath}`, e);
    }
  }

  try {
    updateUploadProgress(id, 95, '提交 manifest…');
    const resp = await fetch('/v1/dirs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Namespace': ns },
      body: JSON.stringify({ entries })
    });
    if (!resp.ok) throw new Error('manifest 提交失败');
    const data = await resp.json();
    updateUploadProgress(id, 100, `✅ 目录上传完成! DirID: ${data.dir_id}`, true);
    toast(`目录 "${dirName}" 上传成功`, 'success');
  } catch (e) {
    updateUploadProgress(id, 0, '❌ ' + e.message, false);
    toast(e.message, 'error');
  }
}

async function uploadFile(file, onProgress) {
  const ns = document.getElementById('namespace').value || 'demo';
  const compress = document.getElementById('compressType').value;
  const chunkSize = parseInt(document.getElementById('chunkSize').value) || 10485760;

  onProgress(0, '计算 SHA-256…');
  const sha256 = await computeSHA256(file);

  // 秒传预检
  onProgress(1, '秒传预检…');
  const checkResp = await fetch(`/v1/files?sha256=${sha256}&name=${encodeURIComponent(file.name)}`, {
    method: 'HEAD', headers: { 'X-Namespace': ns }
  });
  if (checkResp.status === 200) {
    const data = await checkResp.json();
    onProgress(100, `✅ 秒传命中! FileID: ${data.file_id}`, true);
    return data.file_id;
  }

  // 创建会话
  onProgress(2, '创建会话…');
  const initResp = await fetch(`/v1/uploads/init?size=${file.size}`, {
    method: 'POST',
    headers: {
      'X-SHA256': sha256, 'X-Compression': compress,
      'X-Namespace': ns, 'X-File-Name': encodeURIComponent(file.name),
    }
  });
  if (!initResp.ok) throw new Error('创建会话失败');
  const initData = await initResp.json();
  const sessionID = initData.session_id;
  const actualChunkSize = initData.chunk_size || chunkSize;
  const totalChunks = Math.ceil(file.size / actualChunkSize);

  // 上传分片
  let uploadedBytes = 0;
  for (let i = 0; i < totalChunks; i++) {
    const start = i * actualChunkSize;
    const end = Math.min(start + actualChunkSize, file.size);
    const chunk = file.slice(start, end);
    const chunkBuf = await chunk.arrayBuffer();

    const sliceSHA = Array.from(new Uint8Array(await crypto.subtle.digest('SHA-256', chunkBuf)))
      .map(b => b.toString(16).padStart(2, '0')).join('');

    const chunkResp = await fetch(`/v1/uploads/${sessionID}/chunks/${i}`, {
      method: 'PUT',
      body: chunkBuf,
      headers: { 'X-Slice-SHA256': sliceSHA, 'Content-Type': 'application/octet-stream', 'X-Namespace': ns }
    });
    if (!chunkResp.ok) throw new Error(`分片 ${i+1} 失败`);

    uploadedBytes += chunkBuf.byteLength;
    const pct = 2 + (uploadedBytes / file.size) * 93;
    onProgress(pct, `${i+1}/${totalChunks} 分片 · ${formatSize(uploadedBytes)}/${formatSize(file.size)}`);
  }

  // Finalize
  onProgress(96, '合并中…');
  const finalResp = await fetch(`/v1/uploads/${sessionID}/finalize`, {
    method: 'POST', headers: { 'X-Namespace': ns }
  });
  if (!finalResp.ok) throw new Error('Finalize 失败');
  const finalData = await finalResp.json();

  onProgress(100, `✅ 完成! FileID: ${finalData.file_id}`, true);
  return finalData.file_id;
}

// ===== SHA-256 =====
async function computeSHA256(file) {
  const buf = await file.arrayBuffer();
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// ==============================
//  文件列表
// ==============================

async function listFiles() {
  const ns = document.getElementById('namespace').value || 'demo';
  const el = document.getElementById('fileList');

  try {
    const resp = await fetch(`/v1/ls?namespace=${ns}`);
    if (!resp.ok) throw new Error('请求失败');
    const data = await resp.json();
    const children = data.children || [];

    if (children.length === 0) {
      el.innerHTML = '<div class="empty-state">尚无文件</div>';
      document.getElementById('deleteAllBtn').disabled = true;
      return;
    }

    document.getElementById('deleteAllBtn').disabled = false;
    el.innerHTML = children.map(f => renderFileItem(f)).join('');
  } catch (err) {
    el.innerHTML = `<div class="empty-state">加载失败: ${err.message}</div>`;
  }
}

function renderFileItem(f) {
  const id = f.file_id || '';
  const name = f.name || id;
  const size = formatSize(f.size || 0);
  const sha = (f.sha256 || '').slice(0, 12);
  const isDir = f.is_dir;
  return `
    <div class="file-item" id="file-${id}">
      <div class="file-info">
        <div class="file-name">${isDir ? '📁' : '📄'} ${escapeHtml(name)}</div>
        <div class="file-meta">${id.slice(0, 16)}… · ${size} · ${sha ? sha + '…' : ''}
          ${isDir ? '<span class="badge badge-blue">dir</span>' : ''}
        </div>
      </div>
      <div class="file-actions">
        <button class="btn btn-sm" onclick="copyID('${id}')">📋 ID</button>
        <button class="btn btn-sm btn-primary" onclick="downloadByID('${id}', '${escapeHtml(name)}')">⬇ 下载</button>
        <button class="btn btn-sm btn-danger" onclick="deleteFile('${id}')">🗑</button>
      </div>
    </div>`;
}

async function deleteFile(id) {
  const ns = document.getElementById('namespace').value || 'demo';
  if (!confirm(`确定删除 ${id.slice(0,12)}… ？`)) return;

  try {
    const resp = await fetch(`/v1/files/${id}`, { method: 'DELETE', headers: { 'X-Namespace': ns } });
    if (!resp.ok) throw new Error('删除失败: ' + resp.status);
    const item = document.getElementById(`file-${id}`);
    if (item) item.style.opacity = '0.3';
    toast('已删除: ' + id.slice(0, 12) + '…', 'success');
    setTimeout(listFiles, 500);
  } catch (e) {
    toast(e.message, 'error');
  }
}

async function deleteAll() {
  if (!confirm('确定删除所有文件？此操作不可恢复。')) return;

  const ns = document.getElementById('namespace').value || 'demo';
  try {
    const resp = await fetch(`/v1/ls?namespace=${ns}`);
    const data = await resp.json();
    const children = data.children || [];

    for (const f of children) {
      await fetch(`/v1/files/${f.file_id}`, { method: 'DELETE', headers: { 'X-Namespace': ns } });
    }
    toast(`已删除 ${children.length} 个文件`, 'success');
    listFiles();
  } catch (e) {
    toast('删除失败: ' + e.message, 'error');
  }
}

function copyID(id) {
  navigator.clipboard.writeText(id).then(() => toast('已复制 ID'));
}

// ==============================
//  下载系统
// ==============================

const downloadQueueDiv = document.getElementById('downloadQueue');
let downloadIdCounter = 0;

function downloadItemHTML(id, label) {
  return `
    <div class="upload-item" id="dl-${id}">
      <div class="name">⬇️ ${escapeHtml(label)}</div>
      <div class="bar">
        <div class="progress-bar"><div class="fill" id="dfill-${id}"></div></div>
      </div>
      <div class="status" id="dstatus-${id}">准备中…</div>
    </div>`;
}

function updateDL(id, pct, status, success) {
  document.getElementById(`dfill-${id}`).style.width = Math.min(pct, 100) + '%';
  const el = document.getElementById(`dstatus-${id}`);
  el.textContent = status;
  el.className = 'status' + (success === true ? ' success' : success === false ? ' error' : '');
}

function downloadFile() {
  const id = document.getElementById('downloadID').value.trim();
  if (!id) { toast('请输入 FileID', 'error'); return; }
  downloadByID(id, id);
}

function downloadByID(id, name) {
  const ns = document.getElementById('namespace').value || 'demo';
  const format = document.getElementById('downloadFormat').value;
  const verify = document.getElementById('downloadVerify').checked;
  const dlId = ++downloadIdCounter;

  document.getElementById('downloadInfo').textContent = '';
  downloadQueueDiv.insertAdjacentHTML('beforeend', downloadItemHTML(dlId, name));
  updateDL(dlId, 0, '开始下载…');

  const url = format === 'raw'
    ? `/v1/files/${id}?namespace=${ns}`
    : `/v1/dirs/${id}?format=${format}&namespace=${ns}`;

  // 用 fetch + ReadableStream 实现带进度下载
  fetch(url)
    .then(async resp => {
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const total = parseInt(resp.headers.get('Content-Length') || '0');
      const reader = resp.body.getReader();
      const chunks = [];

      let received = 0;
      let lastUpdate = Date.now();
      let lastBytes = 0;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
        received += value.length;

        // 限频更新（每 200ms）
        const now = Date.now();
        if (now - lastUpdate > 200 || received >= total) {
          const pct = total > 0 ? (received / total) * 100 : 0;
          const speed = (received - lastBytes) / ((now - lastUpdate) / 1000);
          lastUpdate = now;
          lastBytes = received;

          let status = `${formatSize(received)}`;
          if (total > 0) status += ` / ${formatSize(total)}`;
          if (speed > 0) status += ` · ${formatSize(speed)}/s`;

          updateDL(dlId, pct, status);
        }
      }

      // 触发浏览器下载（blob URL）
      const blob = new Blob(chunks);
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = name + (format === 'raw' ? '' : '.' + format);
      a.click();
      URL.revokeObjectURL(a.href);

      updateDL(dlId, 100, `✅ 完成 · ${formatSize(received)}`, true);
      toast(`下载完成: ${name}`, 'success');

      if (verify) {
        const sha = resp.headers.get('X-SHA256') || resp.headers.get('X-Tree-SHA256');
        if (sha) document.getElementById('downloadInfo').textContent = `SHA-256: ${sha}`;
      }
    })
    .catch(err => {
      updateDL(dlId, 0, '❌ ' + err.message, false);
      toast(err.message, 'error');
    });
}

// ===== 通用 =====
function formatSize(bytes) {
  if (!bytes || bytes === 0) return '0 B';
  const units = ['B', 'KB', 'MB', 'GB', 'TB'];
  const i = Math.floor(Math.log(bytes) / Math.log(1024));
  return (bytes / Math.pow(1024, i)).toFixed(i > 0 ? 1 : 0) + ' ' + units[i];
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

// 初始加载
listFiles();
</script>
