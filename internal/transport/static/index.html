<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fileupload 管理面板</title>
<style>
  :root {
    --bg: #f5f7fa;
    --card: #fff;
    --border: #e2e8f0;
    --primary: #3b82f6;
    --primary-hover: #2563eb;
    --success: #22c55e;
    --danger: #ef4444;
    --text: #1e293b;
    --text2: #64748b;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 24px;
  }
  .container { max-width: 960px; margin: 0 auto; }
  h1 { font-size: 1.6rem; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
  .subtitle { color: var(--text2); margin-bottom: 24px; font-size: 0.9rem; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }
  .card h2 { font-size: 1.1rem; margin-bottom: 12px; }
  .card-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
  }
  .card-header h2 { margin-bottom: 0; }

  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--primary);
    background: #f0f7ff;
  }
  .upload-zone .icon { font-size: 2.5rem; margin-bottom: 8px; }
  .upload-zone p { color: var(--text2); }
  .upload-zone input { display: none; }

  /* Progress bar */
  .progress-bar {
    width: 100%;
    height: 10px;
    background: var(--border);
    border-radius: 5px;
    overflow: hidden;
    margin: 4px 0;
  }
  .progress-bar .fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), #818cf8);
    width: 0%;
    transition: width 0.3s ease;
    border-radius: 5px;
  }
  .status { font-size: 0.85rem; color: var(--text2); }
  .status.success { color: var(--success); }
  .status.error { color: var(--danger); }

  /* Upload queue items */
  .upload-item {
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
    background: #fafbfc;
  }
  .upload-item .name { font-weight: 500; font-size: 0.9rem; word-break: break-all; }
  .upload-item .meta { font-size: 0.8rem; color: var(--text2); margin: 2px 0; }

  /* File tree */
  .tree-node {
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .tree-node:last-child { border-bottom: none; }
  .tree-row {
    display: flex; align-items: center; gap: 8px;
  }
  .tree-row .icon { font-size: 1.1rem; flex-shrink: 0; }
  .tree-row .name {
    flex: 1; font-size: 0.9rem; cursor: pointer;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .tree-row .name:hover { color: var(--primary); }
  .tree-row .meta { font-size: 0.78rem; color: var(--text2); white-space: nowrap; }
  .tree-row .actions { display: flex; gap: 4px; flex-shrink: 0; }
  .tree-children { padding-left: 24px; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 5px 12px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--card);
    cursor: pointer; font-size: 0.82rem; transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--bg); }
  .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
  .btn-primary:hover { background: var(--primary-hover); }
  .btn-danger { color: var(--danger); border-color: var(--danger); }
  .btn-danger:hover { background: #fef2f2; }
  .btn-sm { padding: 3px 8px; font-size: 0.78rem; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .toast {
    position: fixed; bottom: 24px; right: 24px;
    padding: 12px 20px; border-radius: var(--radius);
    color: #fff; font-size: 0.9rem;
    transform: translateY(80px); opacity: 0;
    transition: all 0.3s; z-index: 100;
    max-width: 400px; word-break: break-all;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: var(--success); }
  .toast.error { background: var(--danger); }

  .config-row {
    display: flex; gap: 16px; flex-wrap: wrap; margin: 12px 0;
  }
  .config-row label {
    display: flex; align-items: center; gap: 6px; font-size: 0.85rem; color: var(--text2);
  }
  .config-row input, .config-row select {
    padding: 4px 8px; border: 1px solid var(--border);
    border-radius: 4px; font-size: 0.85rem; width: 120px;
  }
  .checkbox-label {
    display: flex; align-items: center; gap: 6px; font-size: 0.85rem; cursor: pointer;
  }

  .dir-badge {
    display: inline-block; font-size: 0.7rem; padding: 1px 6px;
    border-radius: 3px; background: #dbeafe; color: #1e40af; margin-left: 4px;
  }
  .empty-state { text-align: center; padding: 24px; color: var(--text2); font-size: 0.9rem; }

  .search-box {
    padding: 6px 12px; border: 1px solid var(--border);
    border-radius: 6px; font-size: 0.85rem; width: 200px;
  }

  @media (max-width: 640px) {
    .tree-row { flex-wrap: wrap; }
    .tree-row .meta { width: 100%; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>📦 fileupload</h1>
  <p class="subtitle">文件上传下载服务 · 管理面板</p>
  <div id="toast" class="toast"></div>

  <!-- Upload Zone -->
  <div class="card">
    <h2>📤 上传</h2>
    <div class="config-row">
      <label>Namespace <input type="text" id="namespace" value="demo" style="width:100px"></label>
      <label>分片 <input type="number" id="chunkSize" value="10485760" min="1024"></label>
      <label>压缩 <select id="compressType"><option value="none">无</option><option value="zstd">zstd</option></select></label>
      <label class="checkbox-label"><input type="checkbox" id="dirMode"> 📁 目录模式</label>
    </div>
    <div class="upload-zone" id="dropZone">
      <div class="icon">☁️</div>
      <p id="dropText">点击选择文件/目录，或拖拽到此处</p>
      <input type="file" id="fileInput" multiple>
    </div>
    <div id="uploadQueue"></div>
  </div>

  <!-- File Tree -->
  <div class="card">
    <div class="card-header">
      <h2>📋 文件</h2>
      <div style="display:flex; gap:8px; align-items:center;">
        <input type="text" id="fileFilter" class="search-box" placeholder="筛选文件名…" oninput="renderFileTree()">
        <button class="btn btn-sm" onclick="loadFileTree()">🔄</button>
        <button class="btn btn-sm btn-danger" onclick="deleteAll()">🗑 清空</button>
      </div>
    </div>
    <div id="fileTree"><div class="empty-state">加载中…</div></div>
  </div>
</div>

<script>
// ===== Toast =====
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type + ' show';
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ===== File Input / Drag-drop =====
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const dropText = document.getElementById('dropText');

function toggleDirMode() {
  const dirMode = document.getElementById('dirMode').checked;
  if (dirMode) {
    fileInput.setAttribute('webkitdirectory', '');
    fileInput.removeAttribute('multiple');
    dropText.textContent = '📁 点击选择目录，或拖拽目录到此处';
  } else {
    fileInput.removeAttribute('webkitdirectory');
    fileInput.setAttribute('multiple', '');
    dropText.textContent = '点击选择文件/目录，或拖拽到此处';
  }
}
document.getElementById('dirMode').addEventListener('change', toggleDirMode);

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  const files = Array.from(e.dataTransfer.files);
  if (files.length) handleFiles(files);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files.length) handleFiles(Array.from(fileInput.files));
  fileInput.value = '';
});

function handleFiles(files) {
  const dirMode = document.getElementById('dirMode').checked;
  const hasRelPath = files[0]?.webkitRelativePath;
  if (dirMode && hasRelPath) {
    startDirUpload(files);
  } else {
    files.forEach(f => startSingleUpload(f));
  }
}

// ==============================
//  Upload
// ==============================
let uploadIdCounter = 0;

function uploadItemHTML(id, fileName, fileSize) {
  return `<div class="upload-item" id="upload-${id}">
    <div class="name">📄 ${esc(fileName)}</div>
    <div class="meta">${fmtSize(fileSize)}</div>
    <div class="bar"><div class="progress-bar"><div class="fill" id="ufill-${id}"></div></div></div>
    <div class="status" id="ustatus-${id}">排队中…</div>
  </div>`;
}

function updProg(id, pct, text, ok) {
  document.getElementById(`ufill-${id}`).style.width = Math.min(pct, 100) + '%';
  const el = document.getElementById(`ustatus-${id}`);
  el.textContent = text;
  el.className = 'status' + (ok === true ? ' success' : ok === false ? ' error' : '');
}

async function startSingleUpload(file, displayName) {
  const id = ++uploadIdCounter;
  const queue = document.getElementById('uploadQueue');
  queue.insertAdjacentHTML('beforeend', uploadItemHTML(id, displayName || file.name, file.size));
  try {
    await uploadFile(file, id, displayName);
  } catch (e) {
    updProg(id, 0, '❌ ' + e.message, false);
    toast(e.message, 'error');
  }
}

async function startDirUpload(files) {
  const id = ++uploadIdCounter;
  const dirName = files[0].webkitRelativePath.split('/')[0];
  const queue = document.getElementById('uploadQueue');
  queue.insertAdjacentHTML('beforeend', uploadItemHTML(id, '📁 ' + dirName, 0));
  updProg(id, 0, `上传目录: ${files.length} 个文件…`);

  const ns = document.getElementById('namespace').value || 'demo';
  const entries = [];

  for (let i = 0; i < files.length; i++) {
    const f = files[i];
    const relPath = f.webkitRelativePath.substring(dirName.length + 1);
    const pct = ((i / files.length) * 100).toFixed(0);
    updProg(id, parseInt(pct), `[${i+1}/${files.length}] ${relPath}`);

    try {
      // 上传文件时指定 webkitRelativePath 以保留目录结构
      const fileID = await uploadFile(f, null, relPath);
      if (fileID) entries.push({ path: relPath, file_id: fileID });
    } catch (e) {
      console.error('目录上传失败:', relPath, e);
    }
  }

  try {
    updProg(id, 95, '提交目录 manifest…');
    const resp = await fetch('/v1/dirs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Namespace': ns },
      body: JSON.stringify({ entries })
    });
    if (!resp.ok) throw new Error('manifest 提交失败: ' + resp.status);
    const data = await resp.json();
    updProg(id, 100, `✅ 目录上传完成! DirID: ${data.dir_id}`, true);
    toast(`📁 "${dirName}" 上传成功 (${files.length} 文件)`, 'success');
    setTimeout(loadFileTree, 500);
  } catch (e) {
    updProg(id, 0, '❌ ' + e.message, false);
    toast(e.message, 'error');
  }
}

async function uploadFile(file, uploadId, customName) {
  const ns = document.getElementById('namespace').value || 'demo';
  const compress = document.getElementById('compressType').value;
  const chunkSize = parseInt(document.getElementById('chunkSize').value) || 10485760;

  // 使用自定义名称（目录上传时传 webkitRelativePath，保留目录结构）
  const fileName = customName || file.name;
  if (uploadId) updProg(uploadId, 0, '计算 SHA-256…');

  const sha256 = await computeSHA256(file);

  // 秒传预检
  if (uploadId) updProg(uploadId, 1, '秒传预检…');
  const checkResp = await fetch(`/v1/files?sha256=${sha256}&name=${encodeURIComponent(fileName)}`, {
    method: 'HEAD', headers: { 'X-Namespace': ns }
  });
  if (checkResp.status === 200) {
    try {
      const data = await checkResp.json();
      if (uploadId) updProg(uploadId, 100, `✅ 秒传命中! FileID: ${data.file_id}`, true);
      return data.file_id;
    } catch (e) { /* no body */ }
  }

  // 创建会话
  if (uploadId) updProg(uploadId, 2, '创建会话…');
  const initResp = await fetch(`/v1/uploads/init?size=${file.size}`, {
    method: 'POST',
    headers: {
      'X-SHA256': sha256, 'X-Compression': compress,
      'X-Namespace': ns, 'X-File-Name': fileName,
    }
  });
  if (!initResp.ok) throw new Error('创建会话失败');
  const initData = await initResp.json();
  const sessionID = initData.session_id;
  const actualChunkSize = initData.chunk_size || chunkSize;
  const totalChunks = Math.ceil(file.size / actualChunkSize);

  // 上传分片
  let uploadedBytes = 0;
  const startTime = Date.now();
  for (let i = 0; i < totalChunks; i++) {
    const start = i * actualChunkSize;
    const end = Math.min(start + actualChunkSize, file.size);
    const chunk = file.slice(start, end);
    const chunkBuf = await chunk.arrayBuffer();

    const sliceSHA = await sha256Hex(chunkBuf);

    const chunkResp = await fetch(`/v1/uploads/${sessionID}/chunks/${i}`, {
      method: 'PUT',
      body: chunkBuf,
      headers: {
        'X-Slice-SHA256': sliceSHA, 'Content-Type': 'application/octet-stream',
        'X-Namespace': ns,
      }
    });
    if (!chunkResp.ok) throw new Error(`分片 ${i+1}/${totalChunks} 失败 (HTTP ${chunkResp.status})`);

    uploadedBytes += chunkBuf.byteLength;
    const pct = 2 + (uploadedBytes / file.size) * 93;
    const elapsed = (Date.now() - startTime) / 1000;
    const speed = elapsed > 0 ? fmtSpeed(uploadedBytes / elapsed) : '';
    const statusText = `${i+1}/${totalChunks} · ${fmtSize(uploadedBytes)}/${fmtSize(file.size)} ${speed ? '· ' + speed : ''}`;
    if (uploadId) updProg(uploadId, pct, statusText);
  }

  // Finalize
  if (uploadId) updProg(uploadId, 96, '合并中…');
  const finalResp = await fetch(`/v1/uploads/${sessionID}/finalize`, {
    method: 'POST', headers: { 'X-Namespace': ns }
  });
  if (!finalResp.ok) throw new Error('Finalize 失败');
  const finalData = await finalResp.json();

  if (uploadId) updProg(uploadId, 100, `✅ 完成! ${finalData.file_id.slice(0,12)}…`, true);
  return finalData.file_id;
}

// ===== SHA-256 =====
async function computeSHA256(file) {
  const buf = await file.arrayBuffer();
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return hex(new Uint8Array(hash));
}
async function sha256Hex(buf) {
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return hex(new Uint8Array(hash));
}
function hex(u8) {
  return Array.from(u8).map(b => b.toString(16).padStart(2, '0')).join('');
}

// ==============================
//  File Tree
// ==============================
let fileTreeData = null;

async function loadFileTree() {
  const ns = document.getElementById('namespace').value || 'demo';
  const el = document.getElementById('fileTree');
  el.innerHTML = '<div class="empty-state">加载中…</div>';
  try {
    const resp = await fetch(`/v1/ls?namespace=${ns}`);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    fileTreeData = (data.children || []).map(f => ({
      id: f.file_id,
      name: f.name,
      path: f.path || f.name,
      size: f.size || 0,
      sha256: f.sha256 || '',
      isDir: f.is_dir || false,
      parentId: f.parent_id || '',
    }));
    renderFileTree();
  } catch (e) {
    el.innerHTML = `<div class="empty-state">❌ ${esc(e.message)}</div>`;
  }
}

function renderFileTree() {
  const el = document.getElementById('fileTree');
  const filter = (document.getElementById('fileFilter').value || '').toLowerCase();
  if (!fileTreeData || fileTreeData.length === 0) {
    el.innerHTML = '<div class="empty-state">尚无文件</div>';
    return;
  }

  // Build tree structure from flat list using path prefix matching
  const roots = [];
  const childrenOf = {};

  for (const f of fileTreeData) {
    if (filter && !f.path.toLowerCase().includes(filter) && !f.name.toLowerCase().includes(filter)) continue;
    const parts = f.path.split('/');
    if (parts.length <= 1) {
      roots.push(f);
    } else {
      const parentPath = parts.slice(0, -1).join('/');
      if (!childrenOf[parentPath]) childrenOf[parentPath] = [];
      childrenOf[parentPath].push(f);
    }
  }

  if (roots.length === 0 && Object.keys(childrenOf).length === 0) {
    el.innerHTML = '<div class="empty-state">无匹配文件</div>';
    return;
  }

  // Display as flat list with indentation
  const allFiles = filter ? fileTreeData.filter(f =>
    f.path.toLowerCase().includes(filter) || f.name.toLowerCase().includes(filter)
  ) : fileTreeData;

  el.innerHTML = allFiles.map(f => {
    const depth = f.path.split('/').length - 1;
    const prefix = '  '.repeat(depth);
    const indent = depth * 24;
    return `<div class="tree-node" style="padding-left:${indent}px">
      <div class="tree-row">
        <span class="icon">${f.isDir ? '📁' : '📄'}</span>
        <span class="name" onclick="${f.isDir ? '' : `downloadFile('${f.id}','${esc(f.name)}','raw')`}" title="${esc(f.path)}">
          ${esc(f.name)}
          ${depth > 0 ? `<span style="color:var(--text2);font-size:0.75rem"> (${esc(f.path)})</span>` : ''}
        </span>
        <span class="meta">${!f.isDir ? fmtSize(f.size) : ''} ${f.sha256 ? f.sha256.slice(0,8) : ''}</span>
        <span class="actions">
          ${f.isDir
            ? `<button class="btn btn-sm" onclick="downloadFile('${f.id}','${esc(f.name)}','tar.gz')" title="下载目录归档">⬇ tar.gz</button>`
            : `<button class="btn btn-sm" onclick="downloadFile('${f.id}','${esc(f.name)}','raw')">⬇</button>`
          }
          <button class="btn btn-sm btn-danger" onclick="deleteFile('${f.id}')">🗑</button>
        </span>
      </div>
    </div>`;
  }).join('');
}

// ===== File Operations =====
async function deleteFile(id) {
  const ns = document.getElementById('namespace').value || 'demo';
  if (!confirm(`确定删除 ${id.slice(0,12)}… ？`)) return;
  try {
    const resp = await fetch(`/v1/files/${id}`, { method: 'DELETE', headers: { 'X-Namespace': ns } });
    if (!resp.ok) throw new Error('删除失败: ' + resp.status);
    toast('已删除', 'success');
    setTimeout(loadFileTree, 300);
  } catch (e) {
    toast(e.message, 'error');
  }
}

async function deleteAll() {
  if (!confirm('确定删除所有文件？')) return;
  const ns = document.getElementById('namespace').value || 'demo';
  try {
    const resp = await fetch(`/v1/ls?namespace=${ns}`);
    const data = await resp.json();
    const children = data.children || [];
    for (const f of children) {
      await fetch(`/v1/files/${f.file_id}`, { method: 'DELETE', headers: { 'X-Namespace': ns } });
    }
    toast(`已删除 ${children.length} 个文件`, 'success');
    loadFileTree();
  } catch (e) {
    toast('删除失败: ' + e.message, 'error');
  }
}

// ===== Download with progress =====
async function downloadFile(id, name, format) {
  const ns = document.getElementById('namespace').value || 'demo';
  const url = format === 'raw'
    ? `/v1/files/${id}?namespace=${ns}`
    : `/v1/dirs/${id}?format=${format}&namespace=${ns}`;

  const dlId = ++uploadIdCounter;
  const queue = document.getElementById('uploadQueue');
  queue.insertAdjacentHTML('beforeend', uploadItemHTML(dlId, '⬇ ' + name, 0));
  updProg(dlId, 0, '开始下载…');

  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('下载失败: HTTP ' + resp.status);

    const total = parseInt(resp.headers.get('Content-Length') || '0');
    if (total > 0) {
      document.getElementById(`ufill-${dlId}`).parentElement.parentElement.previousElementSibling.lastChild.textContent = fmtSize(total);
    }

    const reader = resp.body.getReader();
    const chunks = [];
    let received = 0;
    let lastUpdate = Date.now();
    let lastBytes = 0;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
      received += value.length;

      const now = Date.now();
      if (now - lastUpdate > 200 || received >= total) {
        const pct = total > 0 ? (received / total) * 100 : 0;
        const speed = fmtSpeed((received - lastBytes) / ((now - lastUpdate) / 1000));
        lastUpdate = now;
        lastBytes = received;
        updProg(dlId, pct, `${fmtSize(received)}${total > 0 ? '/' + fmtSize(total) : ''} · ${speed}`);
      }
    }

    const blob = new Blob(chunks);
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    const ext = format === 'raw' ? '' : '.' + format;
    a.download = name + ext;
    a.click();
    URL.revokeObjectURL(a.href);

    updProg(dlId, 100, `✅ ${fmtSize(received)}`, true);
    toast(`⬇ ${name} 下载完成`, 'success');
  } catch (e) {
    updProg(dlId, 0, '❌ ' + e.message, false);
    toast(e.message, 'error');
  }
}

// ===== Utility =====
function fmtSize(bytes) {
  if (!bytes || bytes === 0) return '0 B';
  const units = ['B', 'KB', 'MB', 'GB', 'TB'];
  const i = Math.floor(Math.log(bytes) / Math.log(1024));
  return (bytes / Math.pow(1024, i)).toFixed(i > 0 ? 1 : 0) + ' ' + units[i];
}
function fmtSpeed(bps) {
  return fmtSize(bps) + '/s';
}
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Initial load
